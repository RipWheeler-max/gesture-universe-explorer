<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势控制宇宙探索器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #02030a; font-family: 'Microsoft YaHei', sans-serif; color: #fff; }

        #universe-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #output_canvas {
            position: fixed;
            bottom: 20px; right: 20px;
            width: 320px; height: 240px;
            border: 1px solid rgba(134, 248, 255, 0.55);
            border-radius: 8px;
            z-index: 100;
            transform: scaleX(-1);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45), 0 0 24px rgba(134, 248, 255, 0.16);
        }

        #webcam { display: none; }

        #status-panel {
            position: fixed; top: 20px; left: 20px;
            width: 260px;
            background: rgba(4, 8, 18, 0.78);
            border: 1px solid rgba(134, 248, 255, 0.24);
            border-radius: 8px;
            padding: 20px;
            z-index: 100;
            backdrop-filter: blur(16px);
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
        }

        #status-panel h2 { text-align: center; margin-bottom: 15px; color: #86f8ff; font-size: 18px; }

        .status-group { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .status-label { font-size: 11px; color: #9ea8bd; margin-bottom: 3px; }
        .status-value { font-size: 14px; color: #86f8ff; font-weight: bold; }
        .status-value.active { color: #9dffac; }
        .status-value.warning { color: #ffcf72; }
        .status-value.error { color: #ff6b9c; }

        .control-tips { margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(134,248,255,0.24); }
        .control-tips h3 { font-size: 13px; color: #ffd28a; margin-bottom: 8px; }
        .control-tips ul { list-style: none; font-size: 11px; line-height: 1.6; color: #bdc7d8; }

        #view-panel {
            position: fixed;
            left: 20px; bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: min(620px, calc(100vw - 380px));
            z-index: 100;
            pointer-events: auto;
        }

        #view-panel button {
            min-width: 58px;
            height: 32px;
            border: 1px solid rgba(134, 248, 255, 0.28);
            border-radius: 8px;
            background: rgba(4, 8, 18, 0.72);
            color: #bdc7d8;
            font: inherit;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(14px);
        }

        #view-panel button:hover,
        #view-panel button.active {
            color: #02030a;
            background: #86f8ff;
            border-color: #86f8ff;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #151328 0%, #02030a 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.5s;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }

        .loading-spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(134,248,255,0.18);
            border-top-color: #86f8ff;
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-content { text-align: center; }
        .loading-content h2 { color: #86f8ff; font-size: 20px; margin-bottom: 8px; }
        .loading-content p { color: #9ea8bd; font-size: 13px; }

        @media (max-width: 700px) {
            #status-panel {
                top: 16px; left: 16px;
                width: min(260px, calc(100vw - 32px));
                max-height: calc(100vh - 176px);
                padding: 18px;
                overflow-y: auto;
            }

            #output_canvas {
                right: 12px; bottom: 12px;
                width: 160px; height: 120px;
            }

            #view-panel {
                left: 16px; bottom: 144px;
                width: calc(100vw - 32px);
            }
        }
    </style>
</head>
<body>
    <div id="universe-container"></div>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div id="status-panel">
        <h2>宇宙探索器</h2>
        <div class="status-group">
            <div class="status-label">摄像头状态</div>
            <div id="camera-status" class="status-value">正在请求权限...</div>
        </div>
        <div class="status-group">
            <div class="status-label">手部识别</div>
            <div id="hand-status" class="status-value">未识别到手</div>
        </div>
        <div class="status-group">
            <div class="status-label">手势状态</div>
            <div id="grab-status" class="status-value">待命</div>
        </div>
        <div class="status-group">
            <div class="status-label">当前视角</div>
            <div id="view-status" class="status-value">全宇宙</div>
        </div>
        <div class="status-group">
            <div class="status-label">缩放等级</div>
            <div id="zoom-level" class="status-value">1.0x</div>
        </div>
        <div class="status-group">
            <div class="status-label">旋转速度</div>
            <div id="rotation-speed" class="status-value">0.0</div>
        </div>
        <div class="status-group">
            <div class="status-label">当前帧率</div>
            <div id="fps-counter" class="status-value">0 FPS</div>
        </div>
        <div class="control-tips">
            <h3>控制说明</h3>
            <ul>
                <li>任意手指指向左/右：持续横向旋转</li>
                <li>任意手指指向上/下：持续纵向旋转</li>
                <li>拇指食指捏合移动：拖动整个场景</li>
                <li>双手同时捏合：平移、拉近拉远、旋转</li>
                <li>手掌张开：持续放大</li>
                <li>握拳或五指合拢：优先持续缩小</li>
                <li>手势保持多久，动作就持续多久</li>
            </ul>
        </div>
    </div>

    <div id="view-panel">
        <button type="button" data-view-target="universe">全宇宙</button>
        <button type="button" data-view-target="sun">太阳</button>
        <button type="button" data-view-target="mercury">水星</button>
        <button type="button" data-view-target="venus">金星</button>
        <button type="button" data-view-target="earth">地球</button>
        <button type="button" data-view-target="mars">火星</button>
        <button type="button" data-view-target="jupiter">木星</button>
        <button type="button" data-view-target="saturn">土星</button>
    </div>

    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>正在初始化宇宙探索器</h2>
            <p id="loading-message">正在加载 3D 场景...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <script src="universeScene.js"></script>
    <script src="main.js"></script>
</body>
</html>
